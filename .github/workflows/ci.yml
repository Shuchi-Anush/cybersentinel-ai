name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-system:
    name: Production Hardening Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: .

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 🔹 Fast fail: import sanity BEFORE install-heavy steps
      - name: Basic Import Sanity Check
        run: |
          python -c "print('Python OK')"

      - name: Install Production Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔹 Step 1: Tests
      - name: Run Full Test Suite
        run: |
          pytest tests/ --tb=short

      # 🔹 Step 2: Inference Pipeline
      - name: Inference Pipeline Smoke Test
        run: |
          python -m src.inference.inference_pipeline --sample 2

      # 🔹 Step 3: API Contract
      - name: API Contract Import Check
        run: |
          python -c "from src.api.main import app; print('API OK')"