name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-system:
    name: Production Hardening Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: .
      CI: "true"

    steps:
      # 🔹 Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔹 Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # 🔹 Install deps
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔹 Basic sanity
      - name: Python Sanity Check
        run: python -c "print('Python environment OK')"

      # 🔹 Import-level validation (CRITICAL)
      - name: Import Core Modules
        run: |
          python -c "import src"
          python -c "from src.api.main import app; print('API import OK')"
          python -c "from src.inference.inference_pipeline import InferencePipeline; print('Pipeline import OK')"

      # 🔹 Run tests (skip model-dependent ones)
      - name: Run Test Suite
        run: |
          pytest tests/ --tb=short -q

      # 🔹 Lightweight API schema check
      - name: API Contract Check (No Model Load)
        run: |
          python - <<EOF
          from src.api.main import app
          print("Routes loaded:", len(app.routes))
          assert len(app.routes) > 0
          print("API contract OK")
          EOF

      # 🔹 Explicit skip for heavy inference
      - name: Inference Check (Skipped in CI)
        run: |
          echo "Skipping inference pipeline — requires local model artifacts"

      # 🔹 Final success marker
      - name: CI Success
        run: echo "Production Hardening Audit PASSED"