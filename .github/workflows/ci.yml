name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-system:
    name: Production-Grade CI Refactor
    runs-on: ubuntu-latest

    env:
      CI: "true"
      PYTHONPATH: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import Sanity Check
        run: python -c "import src.api.main; print('Import OK')"

      - name: API Startup Sanity Check
        run: python -c "from src.api.main import app; print('API OK')"

      - name: Run Tests
        run: pytest tests/ -vv --tb=long

      - name: Models Directory Safety Check
        run: |
          if [ -d "models" ]; then
            echo "FAILED: Models directory exists in CI environment, which violates the strict artifact-independence rule."
            exit 1
          fi
          echo "SUCCESS: Models directory not present. CI-safety verified."