name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-system:
    name: Production Hardening Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ Tests (core validation)
      - name: Run Test Suite
        run: pytest tests/ --tb=short

      # ✅ API import (lightweight)
      - name: API Import Check
        run: python -c "from src.api.main import app; print('API OK')"

      # ⚠️ Skip inference (no models in CI)
      - name: Inference Check (Skipped in CI)
        run: echo "Skipping inference test — requires local model artifacts"